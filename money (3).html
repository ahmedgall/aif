<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1xBet Promo - MA & DZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            background: #001a33;
            overflow: hidden;
        }

        @keyframes fadeInBg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at center, #004080 0%, #000c1a 100%);
            padding: 20px;
            animation: fadeInBg 1s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-70px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,114,188,0.1);
            position: relative;
            margin-top: 50px;
            border: 2px solid #0072bc;
            animation: slideDown 0.9s cubic-bezier(0.17, 0.67, 0.83, 0.67) 0.2s forwards;
            opacity: 0;
        }

        .player-img {
            position: absolute;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 210px;
            z-index: 10;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.5));
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: #001a33;
            font-size: 22px;
            margin: 40px 0 10px 0;
            font-weight: 900;
            line-height: 1.2;
            animation: popIn 0.6s ease-out 0.8s forwards;
            opacity: 0;
        }

        .bonus-tag {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            display: inline-block;
            padding: 12px 30px;
            border-radius: 15px;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(255, 215, 0, 0.4);
            animation: popIn 0.6s ease-out 1s forwards;
            opacity: 0;
        }

        .details {
            color: #333;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
            animation: fadeInBg 0.8s ease-out 1.3s forwards;
            opacity: 0;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 5px 15px rgba(0,114,188,0.4); }
            50% { transform: scale(1.03); box-shadow: 0 10px 25px rgba(0,114,188,0.6); }
            100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0,114,188,0.4); }
        }

        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(to right, #0072bc, #00c6ff);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 19px;
            font-weight: bold;
            animation: popIn 0.6s ease-out 1.5s forwards, pulseBtn 2s infinite 2.1s;
            opacity: 0;
        }

        .footer-flags {
            margin-top: 20px;
            font-size: 22px;
            display: flex;
            justify-content: center;
            gap: 15px;
            opacity: 0.8;
        }

        @media (max-height: 600px) {
            .player-img { width: 160px; top: -90px; }
            h1 { font-size: 19px; margin-top: 30px; }
            .bonus-tag { font-size: 22px; padding: 8px 20px; }
            .details { font-size: 13px; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="container">


            <h1>دخل تقيّد دابا وخد الهدية ديالك 🎉</h1>
            
            <div class="bonus-tag">200 درهم / دينار</div>

            <p class="details">
                عرض خاص لخوتنا في <b>المغرب والجزائر</b> 🇲🇦 🇩🇿<br>
                دخل للقناة دابا وخد كود برومو باش تفعّل المكافأة باطل!
            </p>

            <a href="https://t.me/+Wa-1f4HaJkFiMTA0" class="cta-btn" id="btn">
                <span>دخل خُد المكافأة ديالك</span>
            </a>

            <div class="footer-flags">
                <span>🇲🇦</span>
                <span>🇩🇿</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btn').addEventListener('click', function(e) {
            e.preventDefault();
            // توجيه صاروخي لتجنب أي رسائل من المتصفح
            window.location.replace("https://t.me/+Wa-1f4HaJkFiMTA0");
        });
    </script>

</body>
</html>
